# docker-compose.yml
# Docker Centralized Databases
# Copyright (c) 2026 Seyyed Ali Mohammadiyeh (Max Base)
# https://github.com/BaseMax/docker-centralized-databases

networks:
  # External-facing network: other project containers join this to reach MariaDB & Redis
  db-network:
    name: centralized-db-network
    driver: bridge

  # Internal-only network: used solely for admin UIs to reach the databases
  admin-network:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
  redis-data:
    driver: local
  redisinsight-data:
    driver: local

services:

  # ── MariaDB ──────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: centralized-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required – copy .env.example to .env}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind to localhost only so the port is never reachable from outside the host
      - "${MARIADB_HOST:-127.0.0.1}:${MARIADB_PORT:-3306}:3306"
    networks:
      - db-network
      - admin-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    build:
      context: ./phpmyadmin
      dockerfile: Dockerfile
    container_name: centralized-phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      # Prevent connecting to arbitrary servers (security hardening)
      PMA_ARBITRARY: "0"
      # PHP settings – all controlled via environment variables
      UPLOAD_LIMIT: ${PMA_MAX_UPLOAD_SIZE:-256M}
      MAX_EXECUTION_TIME: ${PMA_MAX_EXECUTION_TIME:-600}
      MEMORY_LIMIT: ${PMA_MEMORY_LIMIT:-512M}
    ports:
      # Always bind admin UIs to localhost – never expose to the network
      - "127.0.0.1:${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - admin-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: centralized-redis
    restart: unless-stopped
    # Password is passed via CLI so it is read from the environment and never
    # stored as plain text inside the image or the config file.
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      # Expose to container environment so the healthcheck can use it
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    networks:
      - db-network
      - admin-network
    healthcheck:
      # $$REDIS_PASSWORD → Docker Compose escapes $$ → $REDIS_PASSWORD evaluated
      # inside the container at runtime (from the environment section above).
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Redis Insight ─────────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: centralized-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight-data:/data
    ports:
      - "127.0.0.1:${REDISINSIGHT_PORT:-5540}:5540"
    networks:
      - admin-network
