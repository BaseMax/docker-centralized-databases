# postgres/conf/postgresql.conf
# Custom PostgreSQL configuration.
# Mounted read-only at /etc/postgresql/postgresql.conf inside the container.
#
# PostgreSQL does NOT automatically load this file – it must be referenced via
# the 'command' or 'POSTGRES_INITDB_ARGS' in docker-compose.yml. The service
# uses -c config_file=/etc/postgresql/postgresql.conf at startup.
#
# Alternatively, place any *.conf file under:
#   /var/lib/postgresql/data/pgdata/conf.d/
# and PostgreSQL will load it automatically (requires a custom init script).

# ── Connection ────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections  = 200

# ── Authentication ────────────────────────────────────────────────────────────
# Default authentication method for connections (scram-sha-256 is the modern choice)
password_encryption = scram-sha-256

# ── Performance ───────────────────────────────────────────────────────────────
# Adjust shared_buffers to ~25 % of available RAM for a dedicated DB host.
shared_buffers            = 256MB
effective_cache_size      = 1GB
work_mem                  = 8MB
maintenance_work_memory   = 64MB

# ── Write-Ahead Logging ───────────────────────────────────────────────────────
wal_level    = replica
synchronous_commit = on

# ── Checkpointing ────────────────────────────────────────────────────────────
checkpoint_completion_target = 0.9
max_wal_size                 = 1GB
min_wal_size                 = 80MB

# ── Locale and encoding ───────────────────────────────────────────────────────
timezone                     = 'UTC'
lc_messages                  = 'en_US.utf8'
lc_monetary                  = 'en_US.utf8'
lc_numeric                   = 'en_US.utf8'
lc_time                      = 'en_US.utf8'

# ── Logging ───────────────────────────────────────────────────────────────────
log_destination              = 'stderr'
logging_collector            = off
log_min_duration_statement   = 2000   # log queries slower than 2 s
log_line_prefix              = '%t [%p]: [%l-1] user=%u,db=%d '
log_checkpoints              = on
log_connections              = off
log_disconnections           = off
log_lock_waits               = on
