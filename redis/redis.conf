# redis/redis.conf
# Security-hardened Redis configuration.
# Mounted read-only at /usr/local/etc/redis/redis.conf inside the container.
#
# NOTE: The requirepass directive is intentionally NOT set here.
#       The password is injected at runtime via the --requirepass CLI flag in
#       docker-compose.yml so it is never stored as plain text in this file.

# ── Network ───────────────────────────────────────────────────────────────────
# Bind to all interfaces inside the container; the Docker port binding in
# docker-compose.yml restricts host-level access to 127.0.0.1.
bind 0.0.0.0

# Refuse connections that arrive without authentication when a password is set.
protected-mode yes

port 6379
tcp-backlog 511

# Close idle client connections after N seconds (0 = disabled).
timeout 0
tcp-keepalive 300

# ── Persistence – Append-Only File (AOF) ─────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"

# everysec: flush to disk once per second (good balance of safety and speed).
appendfsync everysec
no-appendfsync-on-rewrite no

# Automatically rewrite the AOF when it grows by 100 % and is at least 64 MB.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Memory management ─────────────────────────────────────────────────────────
# Adjust maxmemory to a suitable fraction of available RAM.
maxmemory 256mb

# Eviction policy: remove the least-recently-used keys from the whole keyspace.
maxmemory-policy allkeys-lru

# ── Dangerous command restrictions ───────────────────────────────────────────
# Uncomment the lines below to disable commands that can destroy all data or
# expose server internals.  Recommended for shared / production environments.
#
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
# rename-command DEBUG    ""
#
# To rename instead of disable (callers must use the new name):
# rename-command FLUSHALL "FLUSHALL_DISABLED_XXXXXXXX"

# ── Slow log ──────────────────────────────────────────────────────────────────
# Log commands that take longer than 10 ms (10 000 µs).
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
# Empty string → log to stdout (captured by Docker).
logfile ""
