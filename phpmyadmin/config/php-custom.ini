; phpmyadmin/config/php-custom.ini
; Additional PHP hardening applied on top of the official image's generated
; uploads.ini. Upload size, execution time, and memory limit are set via the
; UPLOAD_LIMIT / MAX_EXECUTION_TIME / MEMORY_LIMIT environment variables
; (handled by the official phpMyAdmin image entrypoint). This file covers
; settings that those env vars do not manage.

; ── Input / session hardening ──────────────────────────────────────────────────
max_input_vars       = 10000
max_input_time       = 600

; ── Session cookie security ───────────────────────────────────────────────────
session.cookie_httponly  = 1
session.cookie_samesite  = Strict
; Enable Secure flag when phpMyAdmin is served over HTTPS (behind a TLS proxy)
; session.cookie_secure = 1

; ── Information disclosure ────────────────────────────────────────────────────
expose_php = Off

; ── Error display (never leak details to the browser) ────────────────────────
display_errors  = Off
log_errors      = On
